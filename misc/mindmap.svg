83.6172 L332.2256,2383.6172" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="346.915" x="332.2256" y="2421.7656"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="326.915" x="342.2256" y="2444.7607">~1,000 lines soft limit before quality degrades</text><path d="M282.2256,2524.3594 L292.2256,2524.3594 C307.2256,2524.3594 307.2256,2439.9141 322.2256,2439.9141 L332.2256,2439.9141" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="470.502" x="332.2256" y="2478.0625"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="450.502" x="342.2256" y="2501.0576">No external URL fetching in instructions &#8212; copy content directly</text><path d="M282.2256,2524.3594 L292.2256,2524.3594 C307.2256,2524.3594 307.2256,2496.2109 322.2256,2496.2109 L332.2256,2496.2109" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="444.4297" x="332.2256" y="2534.3594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="424.4297" x="342.2256" y="2557.3545">Inline autocomplete NOT affected by instructions (chat only)</text><path d="M282.2256,2524.3594 L292.2256,2524.3594 C307.2256,2524.3594 307.2256,2552.5078 322.2256,2552.5078 L332.2256,2552.5078" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="340.7285" x="332.2256" y="2590.6563"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="320.7285" x="342.2256" y="2613.6514">PR review uses BASE branch instructions only</text><path d="M282.2256,2524.3594 L292.2256,2524.3594 C307.2256,2524.3594 307.2256,2608.8047 322.2256,2608.8047 L332.2256,2608.8047" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="488.7813" x="332.2256" y="2646.9531"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="468.7813" x="342.2256" y="2669.9482">Both repo-wide + path-specific applied when both match same file</text><path d="M282.2256,2524.3594 L292.2256,2524.3594 C307.2256,2524.3594 307.2256,2665.1016 322.2256,2665.1016 L332.2256,2665.1016" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M132.0264,1595.4609 L142.0264,1595.4609 C157.0264,1595.4609 157.0264,2524.3594 172.0264,2524.3594 L182.0264,2524.3594" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="118.9092" x="182.0264" y="2900.2891"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.9092" x="192.0264" y="2923.2842">Best Practices</text><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="373.377" x="350.9355" y="2703.25"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="353.377" x="360.9355" y="2726.2451">Start with 10-20 instructions, iterate one at a time</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,2721.3984 340.9355,2721.3984 L350.9355,2721.3984" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="234.7168" x="350.9355" y="2759.5469"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.7168" x="360.9355" y="2782.542">Keep tools[] minimal in agents</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,2777.6953 340.9355,2777.6953 L350.9355,2777.6953" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="405.6904" x="350.9355" y="2815.8438"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="385.6904" x="360.9355" y="2838.8389">Separate planning agents from implementation agents</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,2833.9922 340.9355,2833.9922 L350.9355,2833.9922" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="436.2334" x="350.9355" y="2872.1406"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="416.2334" x="360.9355" y="2895.1357">Define explicit scope limits + escalation behavior in agents</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,2890.2891 340.9355,2890.2891 L350.9355,2890.2891" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="525.7568" x="350.9355" y="2928.4375"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="505.7568" x="360.9355" y="2951.4326">Avoid conflicting instructions across files (behavior is non-deterministic)</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,2946.5859 340.9355,2946.5859 L350.9355,2946.5859" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="517.3145" x="350.9355" y="2984.7344"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="497.3145" x="360.9355" y="3007.7295">Split repo-wide (cross-cutting) vs path-specific (language/dir) concerns</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,3002.8828 340.9355,3002.8828 L350.9355,3002.8828" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="621.6514" x="350.9355" y="3041.0313"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="601.6514" x="360.9355" y="3064.0264">Fix non-working instructions: make specific+imperative, shorten file, resolve conflicts</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,3059.1797 340.9355,3059.1797 L350.9355,3059.1797" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="646.1992" x="350.9355" y="3097.3281"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="626.1992" x="360.9355" y="3120.3232">Anti-patterns: applyTo:'**' for lang rules, stale library refs, 2000-line files, conflicting files</text><path d="M300.9355,2918.4375 L310.9355,2918.4375 C325.9355,2918.4375 325.9355,3115.4766 340.9355,3115.4766 L350.9355,3115.4766" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M132.0264,1595.4609 L142.0264,1595.4609 C157.0264,1595.4609 157.0264,2918.4375 172.0264,2918.4375 L182.0264,2918.4375" fill="none" style="stroke:#181818;stroke-width:1;"/><?plantuml-src XLZRSXl74NtdL_H3gipBWg1KgJoWafH0Yh9fKnIBaEoa93yCTcU12HSpgvbPa4XaLvxo0QbyeRyaftjcWIKisI_4xknSka-VFjt35o4g7rV6LYlL7aGJ6qrVc_XDDwSBrvh6HRheGdGhyqyLZRC71yTxtp_O_Gd7T6L3z5t9xtIjrxe963scDtun_1G-sFTfhzFIhSZPPaEVo3gwUdb9kgvr6N_aTSVqBkW9bQuoTa4ms5RALw6WeClEcxYXwAmkwCqFqzbjGLQjU5xfx5fREITjScdL7DuPIz_FO7o5BPrVA9iD7nfsgcLkzHUCQ37zLllWh6f-t_wDw-HnQ7hRhqw6DiekEhNGr7fTQwzjYS6FdIdlAMgrmfyGuO8SVATRD_h1LFg3FLsOkEpcup81Fp93YrSLh5