size="14" lengthAdjust="spacing" textLength="468.7744" x="687.7344" y="80.292">Use: coding standards, security tone, OWASP, naming conventions</text><path d="M627.7344,103.5938 L637.7344,103.5938 C652.7344,103.5938 652.7344,75.4453 667.7344,75.4453 L677.7344,75.4453" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="428.0439" x="677.7344" y="113.5938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="408.0439" x="687.7344" y="136.5889">Enable in VS Code: organizationInstructions.enabled=true</text><path d="M627.7344,103.5938 L637.7344,103.5938 C652.7344,103.5938 652.7344,131.7422 667.7344,131.7422 L677.7344,131.7422" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M325.9004,300.6328 L335.9004,300.6328 C350.9004,300.6328 350.9004,103.5938 365.9004,103.5938 L375.9004,103.5938" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="52.5938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="221.2568" x="375.9004" y="161.7422"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.6855" x="385.9004" y="184.7373">Personal Instructions</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="201.2568" x="385.9004" y="201.0342">[GitHub.com only | you only]</text><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="446.7607" x="647.1572" y="169.8906"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="426.7607" x="657.1572" y="192.8857">Use: personal tone, language preference, quick team testing</text><path d="M597.1572,188.0391 L607.1572,188.0391 C622.1572,188.0391 622.1572,188.0391 637.1572,188.0391 L647.1572,188.0391" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M325.9004,300.6328 L335.9004,300.6328 C350.9004,300.6328 350.9004,188.0391 365.9004,188.0391 L375.9004,188.0391" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="270.4619" x="375.9004" y="266.1875"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.0771" x="385.9004" y="289.1826">Repo-Wide</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="215.0586" x="385.9004" y="305.4795">.github/copilot-instructions.md</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="250.4619" x="385.9004" y="321.7764">[always-on | all IDEs + GitHub.com]</text><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="507.1768" x="696.3623" y="226.1875"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="487.1768" x="706.3623" y="249.1826">Use: tech stack, naming, arch patterns, security, error handling, docs</text><path d="M646.3623,300.6328 L656.3623,300.6328 C671.3623,300.6328 671.3623,244.3359 686.3623,244.3359 L696.3623,244.3359" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="601.4854" x="696.3623" y="282.4844"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="581.4854" x="706.3623" y="305.4795">NOT for: one-off tasks, user input/variables, conditional rules, multi-step workflows</text><path d="M646.3623,300.6328 L656.3623,300.6328 C671.3623,300.6328 671.3623,300.6328 686.3623,300.6328 L696.3623,300.6328" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="514.2451" x="696.3623" y="338.7813"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="494.2451" x="706.3623" y="361.7764">Also: AGENTS.md (open standard), CLAUDE.md (Claude Code compat)</text><path d="M646.3623,300.6328 L656.3623,300.6328 C671.3623,300.6328 671.3623,356.9297 686.3623,356.9297 L696.3623,356.9297" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M325.9004,300.6328 L335.9004,300.6328 C350.9004,300.6328 350.9004,300.6328 365.9004,300.6328 L375.9004,300.6328" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="315.1484" x="375.9004" y="435.0781"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.9248" x="385.9004" y="458.0732">Path-Specific</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.1484" x="385.9004" y="474.3701">.github/instructions/NAME.instructions.md</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182.5879" x="385.9004" y="490.667">[glob pattern via applyTo]</text><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="454.082" x="741.0488" y="395.0781"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="434.082" x="751.0488" y="418.0732">Frontmatter: name (opt), description (opt), applyTo glob (opt)</text><path d="M691.0488,469.5234 L701.0488,469.5234 C716.0488,469.5234 716.0488,413.2266 731.0488,413.2266 L741.0488,413.2266" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="524.5195" x="741.0488" y="451.375"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="504.5195" x="751.0488" y="474.3701">Use: language-specific rules, framework patterns, dir-specific standards</text><path d="M691.0488,469.5234 L701.0488,469.5234 C716.0488,469.5234 716.0488,469.5234 731.0488,469.5234 L741.0488,469.5234" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="449.8438" x="741.0488" y="507.6719"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="429.8438" x="751.0488" y="530.667">NOT supported in: JetBrains, Xcode, GitHub.com chat, mobile</text><path d="M691.0488,469.5234 L701.0488,469.5234 C716.0488,469.5234 716.0488,525.8203 731.0488,525.8203 L741.0488,525.8203" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M325.9004,300.6328 L335.9004,300.6328 C350.9004,300.6328 350.9004,469.5234 365.9004,469.5234 L375.9004,469.5234" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M132.0264,1595.4609 L142.0264,1595.4609 C157.0264,1595.4609 157.0264,300.6328 172.0264,300.6328 L182.0264,300.6328" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="157.6484" x="182.0264" y="901.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.6484" x="192.0264" y="924.7451">Reusable Task Files</text><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="259.9961" x="389.6748" y="716.5625"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="86.9668" x="399.6748" y="739.5576">Prompt Files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.9443" x="399.6748" y="755.8545">.github/prompts/*.prompt.md</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="239.9961" x="399.6748" y="772.1514">[on-demand | explicit invoke only]</text><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="409.6484" x="699.6709" y="563.9688"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="389.6484" x="709.6709" y="586.9639">Frontmatter: mode (ask/edit/agent), description, tools[]</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,582.1172 689.6709,582.1172 L699.6709,582.1172" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="343.6133" x="699.6709" y="620.2656"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="323.6133" x="709.6709" y="643.2607">Dynamic vars: ${input:varName:placeholder}</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,638.4141 689.6709,638.4141 L699.6709,638.4141" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="490.3467" x="699.6709" y="676.5625"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="470.3467" x="709.6709" y="699.5576">Invoke: /filename in chat, Attach context menu, /instructions menu</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,694.7109 689.6709,694.7109 L699.6709,694.7109" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="486.252" x="699.6709" y="732.8594"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="466.252" x="709.6709" y="755.8545">Use: one-off tasks, user input needed, code gen, refactor, analysis</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,751.0078 689.6709,751.0078 L699.6709,751.0078" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="563.8809" x="699.6709" y="789.1563"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="543.8809" x="709.6709" y="812.1514">NOT for: persistent behavior, auto-run tasks, complex autonomous workflows</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,807.3047 689.6709,807.3047 L699.6709,807.3047" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="374.2314" x="699.6709" y="845.4531"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.2314" x="709.6709" y="868.4482">Supported: VS Code, Visual Studio, JetBrains ONLY</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,863.6016 689.6709,863.6016 L699.6709,863.6016" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="36.2969" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="268.7871" x="699.6709" y="901.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.7871" x="709.6709" y="924.7451">AI generate: /create-prompt in chat</text><path d="M649.6709,751.0078 L659.6709,751.0078 C674.6709,751.0078 674.6709,919.8984 689.6709,919.8984 L699.6709,919.8984" fill="none" style="stroke:#181818;stroke-width:1;"/><path d="M339.6748,919.8984 L349.6748,919.8984 C364.6748,919.8984 364.6748,751.0078 379.6748,751.0078 L389.6748,751.0078" fill="none" style="stroke:#181818;stroke-width:1;"/><rect fill="#F1F1F1" height="68.8906" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="305.3525" x="389.6748" y="1082.4922"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAd